name: Safety Review

on:
  pull_request:
    paths:
      - 'town.json'
      - 'js/buildings.js'

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Check for prohibited patterns
        run: |
          echo "🔍 Running safety checks..."
          
          VIOLATIONS=""
          
          # Compare PR branch with base branch
          BASE_SHA="origin/${{ github.base_ref }}"
          HEAD_SHA="${{ github.sha }}"
          
          # Check for external resource loaders
          if git diff "$BASE_SHA"..."$HEAD_SHA" -- js/buildings.js town.json | grep -E "(TextureLoader|ImageLoader|FileLoader|GLTFLoader|OBJLoader)" | grep -v "^-"; then
            VIOLATIONS="${VIOLATIONS}❌ PROHIBITED: External resource loaders detected (TextureLoader, ImageLoader, etc.)\n"
          fi
          
          # Check for network requests
          if git diff "$BASE_SHA"..."$HEAD_SHA" -- js/buildings.js | grep -E "(fetch\(|XMLHttpRequest|new Image\()" | grep -v "^-"; then
            VIOLATIONS="${VIOLATIONS}❌ PROHIBITED: Network requests detected (fetch, XMLHttpRequest, Image())\n"
          fi
          
          # Check for external URLs in code (not in contributor.avatar)
          if git diff "$BASE_SHA"..."$HEAD_SHA" -- js/buildings.js | grep -E "https?://" | grep -v "^-" | grep -v "github.com/.*.png"; then
            VIOLATIONS="${VIOLATIONS}❌ PROHIBITED: External URLs detected in building code\n"
          fi
          
          # Check for data URIs
          if git diff "$BASE_SHA"..."$HEAD_SHA" -- js/buildings.js town.json | grep -E "data:image" | grep -v "^-"; then
            VIOLATIONS="${VIOLATIONS}❌ PROHIBITED: Base64 data URIs detected\n"
          fi
          
          # Check for PointLight usage
          if git diff "$BASE_SHA"..."$HEAD_SHA" -- js/buildings.js | grep -E "new THREE\.PointLight" | grep -v "^-"; then
            VIOLATIONS="${VIOLATIONS}⚠️ WARNING: PointLight usage detected (prefer createGlowOrb for performance)\n"
          fi
          
          # Check for MeshPhysicalMaterial usage
          if git diff "$BASE_SHA"..."$HEAD_SHA" -- js/buildings.js | grep -E "MeshPhysicalMaterial" | grep -v "^-"; then
            VIOLATIONS="${VIOLATIONS}⚠️ WARNING: MeshPhysicalMaterial usage detected (prefer MeshStandardMaterial)\n"
          fi
          
          if [ -n "$VIOLATIONS" ]; then
            echo -e "\n🚨 Safety Review Failed:\n"
            echo -e "$VIOLATIONS"
            echo -e "\n📖 Rules: Buildings must use only Three.js geometry and colors. No external resources, loaders, or network requests."
            exit 1
          else
            echo "✅ Safety review passed - no prohibited patterns detected"
          fi

      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **Safety Review Failed**\n\nThis PR contains prohibited patterns. Buildings must be constructed using only Three.js geometry primitives and solid colors/materials.\n\n**Not allowed:**\n- External resource loaders (TextureLoader, ImageLoader, etc.)\n- Network requests (fetch, XMLHttpRequest, Image())\n- External URLs in building code\n- Base64 data URIs\n\n**Performance warnings:**\n- Use `createGlowOrb()` instead of PointLight\n- Use `MeshStandardMaterial` instead of `MeshPhysicalMaterial`\n\nPlease review the [Copilot instructions](.github/copilot-instructions.md#security-rules--strictly-enforced) and update your PR.'
            })
